<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Каталог | OUTSOURCE</title>

    <link rel="stylesheet" href="./styles/main.css">
    <script src="./scripts/main.js" type="module"></script>
  </head>

  <body>
    <header class="header" data-js-header>
      <div class="header__body">
        <div class="header__body-inner container">
          <a class="header__logo" href="./index.html">
            OUTSOURCE
          </a>

          <div class="header__overlay" data-js-header-overlay>
            <nav class="header__menu" aria-label="Главная навигация">
              <ul class="header__menu-list">
                <li class="header__menu-item">
                  <a class="header__menu-link" href="./index.html">
                    Главная
                  </a>
                </li>

                <li class="header__menu-item">
                  <a class="header__menu-link is-active" href="./catalog.html">
                    Каталог
                  </a>
                </li>

                <li class="header__menu-item">
                  <a class="header__menu-link" href="./men.html">
                    Мужчинам
                  </a>
                </li>

                <li class="header__menu-item">
                  <a class="header__menu-link" href="./women.html">
                    Женщинам
                  </a>
                </li>

                <li class="header__menu-item">
                  <a class="header__menu-link" href="./builder.html">
                    Собрать образ
                  </a>
                </li>
              </ul>
            </nav>
          </div>

          <a class="header__cart" href="./cart.html">
            Корзина
          </a>

          <button
            class="burger-button"
            type="button"
            data-js-header-burger-button
            aria-label="Открыть меню">
            <span class="burger-button__line"></span>
            <span class="burger-button__line"></span>
            <span class="burger-button__line"></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="catalog container">
        <aside class="catalog__filters">
          <section class="filter">
            <ul class="filter__list">
              <li class="filter__item">
                <a
                  class="filter__link filter__link--active"
                  href="#"
                  data-category="all">
                  Все
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Футболки">
                  Футболки
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Рубашки">
                  Рубашки
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Свитеры">
                  Свитеры
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Джинсы">
                  Джинсы
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Шорты">
                  Шорты
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Платья">
                  Платья
                </a>
              </li>

              <li class="filter__item">
                <a class="filter__link" href="#" data-category="Сумки">
                  Сумки
                </a>
              </li>
            </ul>
          </section>

          <section class="filter">
            <h3 class="filter__title">
              Цвета
            </h3>

            <div class="filter__colors">
              <button
                class="filter__color filter__color--pink"
                type="button"
                data-color="Розовый"
                aria-label="Розовый">
              </button>

              <button
                class="filter__color filter__color--yellow"
                type="button"
                data-color="Жёлтый"
                aria-label="Жёлтый">
              </button>

              <button
                class="filter__color filter__color--green"
                type="button"
                data-color="Зелёный"
                aria-label="Зелёный">
              </button>

              <button
                class="filter__color filter__color--white"
                type="button"
                data-color="Белый"
                aria-label="Белый">
              </button>

              <button
                class="filter__color filter__color--black"
                type="button"
                data-color="Чёрный"
                aria-label="Чёрный">
              </button>
            </div>
          </section>

          <section class="filter">
            <h3 class="filter__title">
              Цена
            </h3>

            <div class="filter__price">
              <input
                class="filter__input"
                type="number"
                placeholder="от"
                aria-label="Цена от">

              <span class="filter__separator">
                —
              </span>

              <input
                class="filter__input"
                type="number"
                placeholder="до"
                aria-label="Цена до">
            </div>
          </section>
        </aside>

        <div class="catalog__content">
          <div class="product-grid"></div>
        </div>

        <aside class="catalog__sidebar">
          <input
            class="catalog__search"
            type="search"
            placeholder="Поиск товара">

          <a class="catalog__cart-link" href="./cart.html">
            Корзина
          </a>

          <section class="catalog__wishlist">
            <h2 class="catalog__wishlist-title">
              Понравившиеся
            </h2>

            <ul class="catalog__wishlist-list"></ul>
          </section>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner container">
        <p class="site-footer__brand">
          B/Y/F
        </p>

        <p class="site-footer__text">
          Одежда для повседневных образов без лишнего шума.
        </p>

        <a class="site-footer__link" href="./catalog.html">
          В каталог
        </a>
      </div>
    </footer>
  </body>
</html>
